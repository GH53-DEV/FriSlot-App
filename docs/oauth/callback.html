<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FriSlot 登入</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>登入完成</h1>
      <p id="status">正在回到 FriSlot App…</p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const resumeTarget = params.get('to');
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
        const hashParams = new URLSearchParams(hash);
        const hasCode = params.has('code') || params.has('access_token') || hashParams.has('access_token');

        if (!hasCode) {
          document.getElementById('status').textContent =
            '未收到登入授權碼。請回到 App 再試一次 Google 登入。';
          return;
        }

        function appendParams(base, searchParams, hashSearchParams) {
          const pairs = [];
          searchParams.forEach(function (value, key) {
            if (key === 'to') {
              return;
            }
            pairs.push(encodeURIComponent(key) + '=' + encodeURIComponent(value));
          });
          hashSearchParams.forEach(function (value, key) {
            pairs.push(encodeURIComponent(key) + '=' + encodeURIComponent(value));
          });
          if (!pairs.length) {
            return base;
          }
          return base + (base.indexOf('?') >= 0 ? '&' : '?') + pairs.join('&');
        }

        function resumeInApp() {
          if (!resumeTarget) {
            document.getElementById('status').textContent =
              '授權碼已收到。請回到 FriSlot App，若未自動返回可關閉此頁。';
            return;
          }

          window.location.replace(appendParams(resumeTarget, params, hashParams));
        }

        window.setTimeout(resumeInApp, 2500);
      })();
    </script>
  </body>
</html>
