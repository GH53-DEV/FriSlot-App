<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FriSlot 登入</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>登入完成</h1>
      <p>請回到 FriSlot App，若未自動返回可關閉此頁。</p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const resumeTarget = params.get('to');
        if (!resumeTarget) {
          return;
        }

        const hasCode = params.has('code') || params.has('access_token');
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
        const hashParams = new URLSearchParams(hash);
        const hasHashToken = hashParams.has('access_token');
        if (!hasCode && !hasHashToken) {
          return;
        }

        try {
          const target = new URL(resumeTarget);
          params.forEach(function (value, key) {
            if (key === 'to') {
              return;
            }
            target.searchParams.set(key, value);
          });
          hashParams.forEach(function (value, key) {
            target.searchParams.set(key, value);
          });
          window.location.replace(target.toString());
        } catch (_) {}
      })();
    </script>
  </body>
</html>
