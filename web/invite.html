<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FriSlot 邀請</title>
    <style>
      :root {
        --paper-bg: #fffdf6;
        --paper-edge: #d6c69a;
        --ink: #1f2937;
        --muted: #6b7280;
        --accept: #2563eb;
        --reject: #94a3b8;
        --android: #16a34a;
        --ios: #0f172a;
        --have: #0f766e;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
        background: linear-gradient(135deg, #fdf2f8 0%, #ecfeff 100%);
        color: var(--ink);
        min-height: 100vh;
        padding: 32px 16px;
      }
      .wrap { max-width: 480px; margin: 0 auto; }

      .invitation-card {
        position: relative;
        background: var(--paper-bg);
        border: 1px solid var(--paper-edge);
        border-radius: 6px;
        padding: 32px 28px 28px;
        box-shadow:
          0 1px 0 #fff inset,
          0 10px 30px rgba(15, 23, 42, 0.08),
          0 2px 6px rgba(15, 23, 42, 0.06);
      }
      .invitation-card::before,
      .invitation-card::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        height: 6px;
        border-left: 1px dashed var(--paper-edge);
        border-right: 1px dashed var(--paper-edge);
      }
      .invitation-card::before { top: 10px; border-top: 1px dashed var(--paper-edge); }
      .invitation-card::after  { bottom: 10px; border-bottom: 1px dashed var(--paper-edge); }
      .invitation-card .ribbon {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 4px;
        color: #b45309;
        background: #fef3c7;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 12px;
      }
      .invitation-card h1 {
        font-size: 22px;
        line-height: 1.4;
        margin: 4px 0 14px;
        color: #111827;
      }
      .invitation-card .message {
        font-size: 15px;
        line-height: 1.8;
        color: #334155;
        white-space: pre-wrap;
        margin-bottom: 18px;
      }
      .invitation-card .members {
        margin-bottom: 18px;
        padding: 12px 14px;
        background: #fffbeb;
        border: 1px dashed var(--paper-edge);
        border-radius: 8px;
      }
      .invitation-card .members-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      .invitation-card .members-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
      }
      .invitation-card .members-list li {
        font-size: 15px;
        color: #1e293b;
        font-weight: 600;
      }
      .invitation-card .members-list li::before {
        content: "· ";
        color: #b45309;
        font-weight: 700;
      }
      .invitation-card .members.hidden {
        display: none;
      }
      .invitation-card .footer {
        font-size: 12px;
        color: var(--muted);
        text-align: right;
        border-top: 1px dashed var(--paper-edge);
        padding-top: 10px;
        margin-top: 6px;
      }
      .invitation-card .status {
        font-size: 13px;
        color: var(--muted);
        margin-top: 10px;
      }
      .error {
        margin-top: 12px;
        color: var(--danger);
        font-size: 14px;
        white-space: pre-wrap;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
      }
      .actions.hidden { display: none; }
      .actions button {
        flex: 1;
        font-size: 15px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        font-weight: 600;
      }
      .accept { background: var(--accept); color: #fff; }
      .reject { background: var(--reject); color: #fff; }
      .accept:disabled, .reject:disabled { opacity: 0.55; cursor: not-allowed; }

      .email-form {
        margin-top: 18px;
        display: none;
      }
      .email-form.show { display: block; }
      .email-form input {
        width: 100%;
        font-size: 16px;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        margin-top: 10px;
      }
      .email-form input:first-of-type {
        margin-top: 0;
      }
      .email-form input:read-only {
        background: #f1f5f9;
        color: #64748b;
      }
      .email-form .submit {
        margin-top: 12px;
        width: 100%;
        background: var(--accept);
        color: #fff;
        font-weight: 600;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
      }
      .email-form .submit:disabled { opacity: 0.55; cursor: not-allowed; }
      .email-form .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

      .install {
        margin-top: 18px;
        display: none;
      }
      .install.show { display: block; }
      .install .install-hint {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .install .btn-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .install button {
        font-size: 15px;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
        color: #fff;
        font-weight: 600;
        text-align: center;
      }
      .install .android { background: var(--android); }
      .install .ios     { background: var(--ios); }
      .install .have    { background: var(--have); }
      @media (min-width: 420px) {
        .install .btn-row { grid-template-columns: 1fr 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="invitation-card">
        <span class="ribbon">FriSlot 邀請函</span>
        <h1 id="title">載入中…</h1>
        <div class="message" id="message"></div>
        <div class="members hidden" id="members">
          <div class="members-label">密友圈成員</div>
          <ul class="members-list" id="membersList"></ul>
        </div>
        <div class="footer" id="footer"></div>
        <div class="status" id="status"></div>
        <div class="error" id="error"></div>

        <div class="actions" id="actions">
          <button id="accept" class="accept">接受邀請</button>
          <button id="reject" class="reject">不接受</button>
        </div>

        <div class="email-form" id="emailForm">
          <input id="emailInput" type="email" placeholder="email" autocomplete="email" />
          <input id="realNameInput" type="text" placeholder="真實姓名_以免暱稱重複" autocomplete="name" />
          <input id="displayNameInput" type="text" placeholder="暱稱_喜歡大家怎麼稱呼你" />
          <input id="mobileInput" type="tel" placeholder="手機號碼" autocomplete="tel" />
          <button id="emailSubmit" class="submit">回傳並接受邀請</button>
          <p class="hint">資料會寫入邀請與使用者紀錄，安裝 App 後將直接進入此密友圈。</p>
        </div>

        <div class="install" id="install">
          <p class="install-hint" id="installHint">接受邀請後，請依下列方式繼續：</p>
          <div class="btn-row">
            <button id="btnAndroid" class="android">Google Play 安裝</button>
            <button id="btnIos" class="ios">Apple Store 安裝</button>
            <button id="btnHave" class="have">已擁有 FriSlot</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = 'https://obebzwhqpfyvtnxtfzqc.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZWJ6d2hxcGZ5dnRueHRmenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTU4NzMsImV4cCI6MjA5MzAzMTg3M30.oc6xgK_qCPHRExU3s9zTmL93YPAq5YHgKOa57nOMK5g';
      const APP_DEEPLINK_BASE = 'frislotnew://invite';

      const params = new URLSearchParams(window.location.search);
      const token = (params.get('token') || '').trim();

      const titleEl   = document.getElementById('title');
      const msgEl     = document.getElementById('message');
      const membersEl = document.getElementById('members');
      const membersListEl = document.getElementById('membersList');
      const footerEl  = document.getElementById('footer');
      const statusEl  = document.getElementById('status');
      const errorEl   = document.getElementById('error');
      const actionsEl = document.getElementById('actions');
      const acceptBtn = document.getElementById('accept');
      const rejectBtn = document.getElementById('reject');
      const emailFormEl = document.getElementById('emailForm');
      const emailInput  = document.getElementById('emailInput');
      const realNameInput = document.getElementById('realNameInput');
      const displayNameInput = document.getElementById('displayNameInput');
      const mobileInput = document.getElementById('mobileInput');
      const emailSubmit = document.getElementById('emailSubmit');
      const installEl  = document.getElementById('install');
      const installHintEl = document.getElementById('installHint');
      const btnAndroid = document.getElementById('btnAndroid');
      const btnIos     = document.getElementById('btnIos');
      const btnHave    = document.getElementById('btnHave');

      let responded = false;
      let submitInFlight = false;
      let invite = null;
      let existingInviteeProfile = null;

      function interpolate(template, vars) {
        var s = String(template || '').replace(/\{\{(\w+)\}\}/g, function (_, k) {
          return vars[k] != null ? vars[k] : '';
        });
        return s.replace(/\\n/g, '\n');
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function normalizeNicknames(raw) {
        if (!raw) return [];
        if (Array.isArray(raw)) {
          return raw.map(function (n) { return String(n || '').trim(); }).filter(Boolean);
        }
        return [];
      }

      function formatMemberList(nicknames) {
        return normalizeNicknames(nicknames).join('、');
      }

      function renderMembers(nicknames) {
        const list = normalizeNicknames(nicknames);
        if (!list.length) {
          membersEl.classList.add('hidden');
          membersListEl.innerHTML = '';
          return;
        }
        membersEl.classList.remove('hidden');
        membersListEl.innerHTML = list
          .map(function (name) { return '<li>' + escapeHtml(name) + '</li>'; })
          .join('');
      }

      function setButtonsEnabled(enabled) {
        acceptBtn.disabled = !enabled;
        rejectBtn.disabled = !enabled;
      }

      function show(el, on) {
        if (on) el.classList.add('show');
        else el.classList.remove('show');
      }

      function hideActions(on) {
        actionsEl.style.display = on ? 'none' : '';
        if (on) actionsEl.classList.add('hidden');
        else actionsEl.classList.remove('hidden');
      }

      function formatRpcError(err) {
        const message = String(err && err.message ? err.message : err || '');
        try {
          const parsed = JSON.parse(message);
          if (parsed && typeof parsed.message === 'string') return parsed.message;
        } catch (_) {}
        return message;
      }

      async function rpc(fn, body) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || `HTTP ${res.status}`);
        }
        return res.json();
      }

      function buildStoreUrls() {
        const ios = (invite && invite.ios_store_url) || 'https://apps.apple.com/';
        const android = (invite && invite.android_store_url) || 'https://play.google.com/store';
        return { ios, android };
      }

      function buildAppDeepLink() {
        const q = new URLSearchParams();
        q.set('token', token);
        if (invite && invite.circle_ref) {
          q.set('circle_id', invite.circle_ref);
        }
        return `${APP_DEEPLINK_BASE}?${q.toString()}`;
      }

      function openAppDeepLinkOnly() {
        if (!token) {
          errorEl.textContent = '無效邀請：缺少 token';
          return;
        }
        const deepLink = buildAppDeepLink();
        errorEl.textContent = '';
        installHintEl.textContent = '正在開啟 FriSlot App…';

        const openedAt = Date.now();
        const isAndroid = /android/i.test(navigator.userAgent);
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        if (isIOS) {
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = deepLink;
          document.body.appendChild(iframe);
          setTimeout(function () {
            document.body.removeChild(iframe);
            window.location.href = deepLink;
          }, 80);
        } else if (isAndroid) {
          const intentUrl =
            'intent://invite?' +
            new URLSearchParams({
              token,
              ...(invite && invite.circle_ref ? { circle_id: invite.circle_ref } : {}),
            }).toString() +
            '#Intent;scheme=frislotnew;end';
          window.location.href = intentUrl;
          setTimeout(function () {
            window.location.href = deepLink;
          }, 500);
        } else {
          window.location.href = deepLink;
        }

        setTimeout(function () {
          if (document.visibilityState === 'visible' && Date.now() - openedAt < 4000) {
            installHintEl.textContent =
              invite && invite.install_hint
                ? invite.install_hint
                : '接受邀請後，請依下列方式繼續：';
            errorEl.textContent =
              '若未自動開啟 App：請確認已安裝 FriSlot 正式版（非僅瀏覽器），並用與邀請相同的 email 登入。';
          }
        }, 2800);
      }

      function showInviteeForm() {
        const presetEmail = (invite && invite.invited_email) ? invite.invited_email.trim() : '';
        emailInput.value = presetEmail;
        emailInput.readOnly = Boolean(presetEmail);
        realNameInput.value = (invite && invite.invitee_real_name) || '';
        displayNameInput.value = (invite && invite.invitee_display_name) || '';
        mobileInput.value = (invite && invite.invitee_mobile) || '';
        show(emailFormEl, true);
        hideActions(true);
        if (!presetEmail) {
          emailInput.focus();
        } else {
          realNameInput.focus();
        }
      }

      function renderInvitation(row) {
        invite = row;
        const memberList = formatMemberList(row.circle_member_nicknames);
        const vars = {
          inviter_name: row.inviter_name || '好友',
          inviter_email: row.inviter_email || '',
          circle_name: row.circle_name || '',
          member_list: memberList,
        };
        titleEl.textContent  = interpolate(row.card_title  || '{{inviter_name}} 邀請你加入 {{circle_name}}', vars);
        msgEl.textContent    = interpolate(row.card_message || '', vars);
        renderMembers(row.circle_member_nicknames);
        footerEl.textContent = row.card_footer || '';
        installHintEl.textContent = row.install_hint || '接受邀請後，請依下列方式繼續：';
        statusEl.textContent = `目前狀態：${row.status}`;

        if (row.status !== 'pending') {
          responded = true;
          hideActions(true);
          show(emailFormEl, false);
          if (row.status === 'accepted') {
            show(installEl, true);
          }
        } else {
          hideActions(false);
        }
      }

      async function loadInvite() {
        if (!token) {
          errorEl.textContent = '無效邀請：缺少 token';
          hideActions(true);
          return;
        }
        try {
          const data = await rpc('get_invitation_by_token', { p_token: token });
          const row = Array.isArray(data) ? data[0] : null;
          if (!row) throw new Error('邀請不存在或已失效');
          renderInvitation(row);
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
          hideActions(true);
        }
      }

      async function markAccepted() {
        const data = await rpc('respond_invitation', { p_token: token, p_action: 'accept' });
        const row = Array.isArray(data) ? data[0] : null;
        if (!row) throw new Error('更新邀請狀態失敗');
        return row;
      }

      async function markRejected() {
        const data = await rpc('respond_invitation', { p_token: token, p_action: 'reject' });
        const row = Array.isArray(data) ? data[0] : null;
        if (!row) throw new Error('更新邀請狀態失敗');
        return row;
      }

      async function submitInviteeDetails(email, realName, displayName, mobile) {
        await rpc('submit_invitation_invitee_details', {
          p_token: token,
          p_email: email,
          p_real_name: realName || null,
          p_display_name: displayName || null,
          p_mobile: mobile || null,
        });
      }

      async function lookupInviteeProfile(email) {
        const normalizedEmail = (email || '').trim();
        if (!normalizedEmail) {
          return null;
        }
        const data = await rpc('get_invitation_invitee_profile', {
          p_token: token,
          p_email: normalizedEmail,
        });
        const row = Array.isArray(data) ? data[0] : null;
        return row && row.has_user ? row : null;
      }

      function setProfileInputState(input, value) {
        const text = String(value || '').trim();
        input.value = text;
        input.readOnly = Boolean(text);
      }

      function clearExistingProfileLocks() {
        existingInviteeProfile = null;
        realNameInput.readOnly = false;
        displayNameInput.readOnly = false;
        mobileInput.readOnly = false;
      }

      function applyExistingInviteeProfile(profile) {
        existingInviteeProfile = profile;
        if (!profile) {
          clearExistingProfileLocks();
          return;
        }
        setProfileInputState(realNameInput, profile.real_name);
        setProfileInputState(displayNameInput, profile.display_name);
        setProfileInputState(mobileInput, profile.mobile);
      }

      async function refreshInviteeProfileFromEmail() {
        const email = (emailInput.value || '').trim();
        const previousProfileEmail = existingInviteeProfile && existingInviteeProfile.email;
        if (previousProfileEmail && previousProfileEmail.toLowerCase() !== email.toLowerCase()) {
          realNameInput.value = '';
          displayNameInput.value = '';
          mobileInput.value = '';
        }
        clearExistingProfileLocks();
        if (!email) {
          return;
        }
        try {
          const profile = await lookupInviteeProfile(email);
          if (profile) {
            applyExistingInviteeProfile(profile);
          }
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
        }
      }

      async function onAcceptClicked() {
        if (responded || submitInFlight || !invite) return;
        errorEl.textContent = '';
        showInviteeForm();
        await refreshInviteeProfileFromEmail();
      }

      async function onRejectClicked() {
        if (responded || submitInFlight) return;
        try {
          submitInFlight = true;
          setButtonsEnabled(false);
          errorEl.textContent = '';
          const row = await markRejected();
          responded = true;
          statusEl.textContent = `目前狀態：${row.status}`;
          hideActions(true);
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
          if (!responded) setButtonsEnabled(true);
        } finally {
          submitInFlight = false;
        }
      }

      async function onEmailSubmit() {
        const email = (emailInput.value || '').trim();
        const realName = (realNameInput.value || '').trim();
        const displayName = (displayNameInput.value || '').trim();
        const mobile = (mobileInput.value || '').trim();
        if (!email) {
          errorEl.textContent = '請輸入 email';
          return;
        }
        try {
          emailSubmit.disabled = true;
          errorEl.textContent = '';
          await submitInviteeDetails(email, realName, displayName, mobile);
          const row = await markAccepted();
          responded = true;
          invite = Object.assign({}, invite || {}, {
            invited_email: email,
            invitee_real_name: (existingInviteeProfile && existingInviteeProfile.real_name) || realName,
            invitee_display_name: (existingInviteeProfile && existingInviteeProfile.display_name) || displayName,
            invitee_mobile: (existingInviteeProfile && existingInviteeProfile.mobile) || mobile,
            status: row.status,
            circle_ref: row.circle_ref || (invite && invite.circle_ref),
          });
          statusEl.textContent = `目前狀態：${row.status}`;
          show(emailFormEl, false);
          hideActions(true);
          show(installEl, true);
          installHintEl.textContent = '邀請已接受，正在開啟 FriSlot App 完成加入密友圈…';
          setTimeout(function () {
            openAppDeepLinkOnly();
          }, 350);
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
          emailSubmit.disabled = false;
        }
      }

      acceptBtn.addEventListener('click', onAcceptClicked);
      rejectBtn.addEventListener('click', onRejectClicked);
      emailSubmit.addEventListener('click', onEmailSubmit);
      emailInput.addEventListener('blur', () => {
        if (!emailInput.readOnly) void refreshInviteeProfileFromEmail();
      });
      emailInput.addEventListener('change', () => {
        if (!emailInput.readOnly) void refreshInviteeProfileFromEmail();
      });
      btnAndroid.addEventListener('click', () => {
        const { android } = buildStoreUrls();
        window.location.href = android;
      });
      btnIos.addEventListener('click', () => {
        const { ios } = buildStoreUrls();
        window.location.href = ios;
      });
      btnHave.addEventListener('click', () => openAppDeepLinkOnly());

      loadInvite();
    </script>
  </body>
</html>
