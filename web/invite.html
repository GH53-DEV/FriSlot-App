<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FriSlot 邀請</title>
    <style>
      body { font-family: Arial, sans-serif; background:#f8fafc; color:#1e293b; }
      .card { max-width: 460px; margin: 40px auto; background:#fff; border-radius: 12px; padding: 20px; }
      .muted { color:#64748b; font-size:14px; }
      .error { color:#b91c1c; white-space: pre-wrap; }
      .row { display:flex; gap:12px; margin-top:18px; }
      button { border:0; border-radius:8px; padding:10px 16px; cursor:pointer; }
      .accept { background:#2563eb; color:#fff; }
      .reject { background:#64748b; color:#fff; }
      .open-app { background:#0f766e; color:#fff; margin-top:12px; display:none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>FriSlot 邀請頁</h2>
      <p id="summary" class="muted">載入中…</p>
      <p id="status" class="muted"></p>
      <p id="error" class="error"></p>
      <div class="row">
        <button id="accept" class="accept">接受邀請</button>
        <button id="reject" class="reject">不接受</button>
      </div>
      <button id="openApp" class="open-app">手動開啟 App</button>
    </div>

    <script>
      // Replace with your real values before deployment.
      const SUPABASE_URL = 'https://obebzwhqpfyvtnxtfzqc.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZWJ6d2hxcGZ5dnRueHRmenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTU4NzMsImV4cCI6MjA5MzAzMTg3M30.oc6xgK_qCPHRExU3s9zTmL93YPAq5YHgKOa57nOMK5g';
      const APP_DEEPLINK_SCHEME = 'frislotnew://invite?token=';
      // Update these after app release.
      const IOS_APP_ID = '';
      const ANDROID_APP_PACKAGE = '';
      const IOS_STORE_URL = IOS_APP_ID
        ? `https://apps.apple.com/app/id${encodeURIComponent(IOS_APP_ID)}`
        : 'https://apps.apple.com';
      const ANDROID_STORE_URL = ANDROID_APP_PACKAGE
        ? `https://play.google.com/store/apps/details?id=${encodeURIComponent(ANDROID_APP_PACKAGE)}`
        : 'https://play.google.com/store';

      const params = new URLSearchParams(window.location.search);
      const token = (params.get('token') || '').trim();
      const summaryEl = document.getElementById('summary');
      const statusEl = document.getElementById('status');
      const errorEl = document.getElementById('error');
      const acceptBtn = document.getElementById('accept');
      const rejectBtn = document.getElementById('reject');
      const openAppBtn = document.getElementById('openApp');
      let responded = false;
      let submitInFlight = false;

      if (!token) {
        errorEl.textContent = '無效邀請：缺少 token';
        acceptBtn.disabled = true;
        rejectBtn.disabled = true;
      }

      async function rpc(fn, body) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || `HTTP ${res.status}`);
        }
        return res.json();
      }

      function setButtonsEnabled(enabled) {
        acceptBtn.disabled = !enabled;
        rejectBtn.disabled = !enabled;
      }

      function formatRpcError(err) {
        const message = String(err && err.message ? err.message : err || '');
        try {
          const parsed = JSON.parse(message);
          if (parsed && typeof parsed.message === 'string') {
            return parsed.message;
          }
        } catch (_) {
          // Keep original message if it is not JSON.
        }
        return message;
      }

      function openAppOrStore() {
        const deepLink = `${APP_DEEPLINK_SCHEME}${encodeURIComponent(token)}`;
        const fallback = /iphone|ipad|ipod/i.test(navigator.userAgent) ? IOS_STORE_URL : ANDROID_STORE_URL;
        // Android browsers inside LINE can be stricter; try intent URL first.
        if (/android/i.test(navigator.userAgent)) {
          const encoded = encodeURIComponent(deepLink);
          window.location.href = `intent://invite?token=${encodeURIComponent(token)}#Intent;scheme=frislotnew;package=host.exp.exponent;S.browser_fallback_url=${encodeURIComponent(fallback)};end`;
          setTimeout(() => {
            window.location.href = deepLink;
          }, 400);
        } else {
          window.location.href = deepLink;
        }
        setTimeout(() => {
          window.location.href = fallback;
        }, 1200);
      }

      async function loadInvite() {
        try {
          const data = await rpc('get_invitation_by_token', { p_token: token });
          const row = Array.isArray(data) ? data[0] : null;
          if (!row) {
            throw new Error('邀請不存在或已失效');
          }
          const inviter = row.inviter_name || row.inviter_email || '好友';
          summaryEl.textContent = `${inviter} 邀請你加入「${row.circle_name}」`;
          statusEl.textContent = `目前狀態：${row.status}`;
          if (row.status !== 'pending') {
            responded = true;
            setButtonsEnabled(false);
          }
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
          setButtonsEnabled(false);
        }
      }

      async function respond(action) {
        if (responded || submitInFlight) {
          return;
        }
        try {
          submitInFlight = true;
          setButtonsEnabled(false);
          errorEl.textContent = '';
          const data = await rpc('respond_invitation', { p_token: token, p_action: action });
          const row = Array.isArray(data) ? data[0] : null;
          if (!row) {
            throw new Error('更新邀請狀態失敗');
          }
          responded = true;
          statusEl.textContent = `目前狀態：${row.status}`;

          if (action === 'accept') {
            openAppBtn.style.display = 'inline-block';
            openAppOrStore();
          }
        } catch (err) {
          errorEl.textContent = formatRpcError(err);
          submitInFlight = false;
          if (!responded) {
            setButtonsEnabled(true);
          }
          return;
        } finally {
          if (responded) {
            submitInFlight = false;
            setButtonsEnabled(false);
          }
        }
      }

      acceptBtn.addEventListener('click', () => respond('accept'));
      rejectBtn.addEventListener('click', () => respond('reject'));
      openAppBtn.addEventListener('click', () => openAppOrStore());
      loadInvite();
    </script>
  </body>
  </html>
